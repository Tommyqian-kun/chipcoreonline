version: '3.8'

services:
  # PostgreSQL 数据库 - 生产级配置
  postgres:
    image: postgres:11-alpine
    container_name: chipcore_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: chipcore_dev
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      # 性能优化配置
      POSTGRES_SHARED_BUFFERS: 256MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 1GB
      POSTGRES_WORK_MEM: 4MB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups  # 备份目录挂载
    restart: unless-stopped
    # 资源限制
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    # 健康检查
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chipcore_dev"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # 网络配置
    networks:
      - chipcore_network

  # Redis 缓存 - 生产级配置
  redis:
    image: redis:5-alpine
    container_name: chipcore_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    # 资源限制
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    # 健康检查
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # 网络配置
    networks:
      - chipcore_network

# 网络配置
networks:
  chipcore_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# 数据卷配置
# 使用相对路径，相对于 docker-compose.yml 所在目录
# 卷数据将存储在项目根目录的 docker/volumes/ 下
volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/../docker/volumes/postgres
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/../docker/volumes/redis