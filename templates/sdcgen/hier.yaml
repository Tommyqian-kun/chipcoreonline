pwr:
#    VDD_CPU_H:  TT1P000V TT0P950V TT0P900V TT0P850V TT0P800V TT0P750V TT0P650V TT0P600V TT0P550V
#    VDD_CPU_B:  TT0P900V TT0P850V TT0P800V TT0P750V TT0P650V TT0P600V TT0P550V
#    VDD_CPU_M:  TT0P900V TT0P850V TT0P800V TT0P750V TT0P650V TT0P600V TT0P550V
#    VDD_CPU_L:  TT0P850V TT0P800V TT0P750V TT0P650V TT0P600V TT0P550V
#    VDD_GPU_TOP: TT0P750V TT0P650V TT0P600V TT0P550V
    VDD_CORE:   TT0P750V TT0P700V TT0P650V
    VDD_MM_CSS: TT0P650V TT0P600V TT0P550V    
    VDDM_CLPS: TT0P800V TT0P750V TT0P700V
    VDDM_LPI: TT0P750V
    VDD_LPI: TT0P850V TT0P650V TT0P600V TT0P550V
    VDD_PLL_PST_AON: TT0P750V
    VDD_PLL_PST_TOP: TT0P750V
    VDD_GNPU: TT0P850V TT0P750V TT0P700V


# must expand all of inst/mac/dig including crg and pll and block with user_defined sdc
# for MIM, just such as multi CRG or PLL, must add different alias, follow example below:
#       - u_clk_top_wrap, clk_core, crg, MCUCRG1, VDDM_CLPS

hier:
  jpeg_top_wrapx:
    hdlevel: blk
    alias: JPEG
    prime_pwr: VDDM_CLPS
    insts:
    mac_insts:
    dig_insts:
      - u_jpeg_top/u_arv_top, arv_top, VDDM_CLPS
    constr_dir: /home/master/stone/tmp/const/tpy/vscode/sdcgen/template/inputs/
  spg_top:
    hdlevel: blk
    alias: SPG
    prime_pwr: VDDM_CLPS
    insts:
    mac_insts:
    dig_insts:
    constr_dir: $env(SYS_CAMERA_ICDIR)/de/impl/spg_top/
  arv_top:
    hdlevel: blk
    alias: AVE
    prime_pwr: VDDM_CLPS
    insts:
    #  - u_asp_top/u_tpg_top, tpg_top, VDDM_CLPS
    mac_insts:
      - u_cr8_top, cr8_top,VDDM_CLPS: |
          if {[file exists $SDCVAR(SDC_DIR,${AVE})/arv_top/sdc/inputs/mdblk/cr8_top.sdc]} {
              source -echo -verbose $SDCVAR(SDC_DIR,${AVE})/arv_top/sdc/inputs/mdblk/cr8_top.sdc
          } else {
              puts "SDC_WARN: Missing cr8_top SDC file. Please check it."
          }
    dig_insts:
    constr_dir: /home/master/stone/tmp/const/tpy/vscode/sdcgen/template/inputs/
  cr8_top:
    hdlevel: lib
    alias: CR8
    prime_pwr: VDDM_CLPS
    insts:
    mac_insts:
    dig_insts:
    constr_dir: $env(SYS_CAMERA_ICDIR)/de/impl/spg_top/